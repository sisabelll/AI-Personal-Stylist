name: Trend Watcher (Biweekly)

on:
  schedule:
    - cron: '0 14 1,15 * *'  # 1st & 15th at 14:00 UTC (10am EDT / 9am EST)
  workflow_dispatch:           # allow manual runs from GitHub Actions UI

jobs:
  run-trend-watcher:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trend watcher
        id: run
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python agents/trend_watcher.py 2>&1 | tee /tmp/trend_output.txt

      - name: Send run summary email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: Trend Watcher <${{ secrets.EMAIL_USERNAME }}>
          subject: "Trend Watcher — ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }} (${{ github.run_id }})"
          body: |
            Trend Watcher biweekly run completed.

            Status: ${{ job.status }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            --- Output ---
          attachments: /tmp/trend_output.txt

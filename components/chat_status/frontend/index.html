<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      padding: 4px 0 4px;
    }

    #wrap {
      opacity: 0;
      transition: opacity 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #wrap.on { opacity: 1; }

    /* ── Typing dots ──────────────────────────────────────── */
    #dots {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .dot {
      width: 6px;
      height: 6px;
      background: #C9A96E;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.7); }
      50%       { opacity: 1;   transform: scale(1);   }
    }

    /* ── Label ─────────────────────────────────────────────── */
    #label {
      font-size: 0.65rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #B8AFA8;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <span id="label"></span>
  </div>

  <script>
    function toSL(type, extra) {
      window.parent.postMessage({ isStreamlitMessage: true, type, ...extra }, '*');
    }

    const ro = new ResizeObserver(() => {
      toSL('streamlit:setFrameHeight', { height: document.body.scrollHeight + 4 });
    });
    ro.observe(document.body);

    toSL('streamlit:componentReady', { apiVersion: 1 });

    window.addEventListener('message', event => {
      if (!event.data || event.data.type !== 'streamlit:render') return;
      const { label = '', visible = true } = event.data.args || {};
      document.getElementById('label').textContent = label;
      document.getElementById('wrap').className = visible ? 'on' : '';
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      padding: 4px 0 2px;
    }

    #wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    /* ── Textarea ──────────────────────────────────────────── */
    textarea {
      flex: 1;
      min-height: 46px;
      max-height: 128px;
      resize: none;
      overflow-y: hidden;
      border: 1px solid #DDD6CE;
      border-radius: 14px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: #3A3530;
      background: #FDFAF7;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s ease;
    }
    textarea::placeholder {
      color: #C2BAB3;
      font-style: italic;
      font-weight: 300;
    }
    textarea:focus { border-color: #C9A96E; background: #FFFFFF; }
    textarea:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Send button ──────────────────────────────────────── */
    #send {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      background: #C9A96E;
      color: #FFFFFF;
      font-size: 1.15rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    #send:hover:not(:disabled)  { background: #B8924F; transform: scale(1.06); }
    #send:active:not(:disabled) { transform: scale(0.96); }
    #send:disabled {
      background: #EDE8E2;
      color: #C2BAB3;
      cursor: default;
      transform: none;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <textarea id="input" rows="1"></textarea>
    <button id="send" type="button" disabled aria-label="Send">↑</button>
  </div>

  <script>
    // ── Streamlit wire protocol ─────────────────────────────
    function toSL(type, extra) {
      window.parent.postMessage({ isStreamlitMessage: true, type, ...extra }, '*');
    }

    const ro = new ResizeObserver(() => {
      toSL('streamlit:setFrameHeight', { height: document.body.scrollHeight + 4 });
    });
    ro.observe(document.body);

    toSL('streamlit:componentReady', { apiVersion: 1 });

    // ── Elements ────────────────────────────────────────────
    const input = document.getElementById('input');
    const btn   = document.getElementById('send');

    // ── Auto-resize textarea ────────────────────────────────
    function resize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 128) + 'px';
      // overflow-y: auto when content exceeds max
      input.style.overflowY = input.scrollHeight > 128 ? 'auto' : 'hidden';
    }

    input.addEventListener('input', () => {
      btn.disabled = !input.value.trim();
      resize();
    });

    // ── Submit ──────────────────────────────────────────────
    function submit() {
      const val = input.value.trim();
      if (!val || btn.disabled) return;
      toSL('streamlit:setComponentValue', { value: val, dataType: 'json' });
      input.value = '';
      input.style.height = 'auto';
      btn.disabled = true;
    }

    btn.addEventListener('click', submit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
    });

    // ── Receive props ───────────────────────────────────────
    window.addEventListener('message', event => {
      if (!event.data || event.data.type !== 'streamlit:render') return;
      const { placeholder = 'Ask your stylist…' } = event.data.args || {};
      input.placeholder = placeholder;
    });
  </script>
</body>
</html>
